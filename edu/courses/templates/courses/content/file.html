{% with ext=item.file.name|lower|slice:"-4:" %}
    {% if ext == ".pdf" %}
        <div
            class="c-pdf-viewer js-pdf-viewer"
            data-pdf-url="{% url 'student_file_view' item.id %}"
            data-search-url="{% url 'student_file_search' item.id %}"
            data-page-text-url="{% url 'student_file_page_text' item.id %}"
            {% if content %}
            data-content-id="{{ content.id }}"
            data-progress-url="{% url 'track_content_progress' content.id %}"
            data-start-page="{{ content_progress.page|default:content_progress.current_page|default:1 }}"
            data-start-offset="{{ content_progress.page_offset_ratio|default:0 }}"
            data-start-doc-y="{{ content_progress.doc_y_ratio|default:0 }}"
            data-start-zoom="{{ content_progress.zoom|default:0 }}"
            data-max-page-seen="{{ content_progress.max_page_seen|default:1 }}"
            {% endif %}
        >
            <div class="c-pdf-toolbar" data-toolbar-state="default">
                <div class="c-pdf-toolbar__default">
                    <div class="c-pdf-toolbar__section c-pdf-toolbar__section--icons">
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-sidebar-toggle" type="button" aria-label="Toggle modules sidebar">
                            ☰
                        </button>
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-toggle" type="button" aria-label="Search">
                            🔍
                        </button>
                    </div>
                    <div class="c-pdf-toolbar__section c-pdf-toolbar__section--nav">
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-prev" type="button" aria-label="Previous page">
                            ‹
                        </button>
                        <div class="c-pdf-page-group">
                            <input
                                class="c-input c-pdf-page-input js-pdf-page-input"
                                type="number"
                                min="1"
                                value="1"
                                aria-label="Jump to page"
                            />
                            <span class="c-card__meta c-pdf-toolbar__meta">
                                of <strong class="js-pdf-total">--</strong>
                            </span>
                        </div>
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-next" type="button" aria-label="Next page">
                            ›
                        </button>
                    </div>
                    <span class="c-pdf-toolbar__divider" aria-hidden="true"></span>
                    <div class="c-pdf-toolbar__section c-pdf-toolbar__section--zoom">
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-zoom-out" type="button" aria-label="Zoom out">
                            -
                        </button>
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-zoom-in" type="button" aria-label="Zoom in">
                            +
                        </button>
                        <select class="c-input c-pdf-zoom-select js-pdf-zoom-select" aria-label="Zoom level">
                            <option value="auto">Automatic Zoom</option>
                            <option value="actual">Actual Size</option>
                            <option value="fit-page">Page Fit</option>
                            <option value="fit-width">Page Width</option>
                            <option value="custom" data-zoom-custom>100%</option>
                            <option value="0.5">50%</option>
                            <option value="0.75">75%</option>
                            <option value="1">100%</option>
                            <option value="1.25">125%</option>
                            <option value="1.5">150%</option>
                            <option value="2">200%</option>
                            <option value="3">300%</option>
                            <option value="4">400%</option>
                        </select>
                    </div>
                    <div class="c-pdf-toolbar__section c-pdf-toolbar__section--color">
                        <label class="c-pdf-slider">
                            <input class="c-pdf-brightness js-pdf-brightness" type="range" min="0" max="1.3" step="0.05" value="1" />
                        </label>
                        <span
                            class="c-pdf-progress js-pdf-progress"
                            role="progressbar"
                            aria-label="PDF reading progress"
                            aria-valuemin="0"
                            aria-valuemax="100"
                            aria-valuenow="0"
                        >
                            <span class="c-pdf-progress__label js-pdf-progress-label" aria-hidden="true">0%</span>
                        </span>
                    </div>
                </div>
                <div class="c-pdf-toolbar__search">
                    <div class="c-pdf-toolbar__section c-pdf-toolbar__search-main">
                        <input
                            class="c-input c-pdf-search-input js-pdf-search-input"
                            type="search"
                            placeholder="Find in document..."
                            aria-label="Search PDF"
                        />
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-prev" type="button" aria-label="Previous match">
                            ‹
                        </button>
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-next" type="button" aria-label="Next match">
                            ›
                        </button>
                        <span class="c-card__meta c-pdf-toolbar__meta js-pdf-search-count"></span>
                    </div>
                    <div class="c-pdf-toolbar__section c-pdf-toolbar__search-options">
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-toggle-highlight" type="button" aria-pressed="true">
                            Highlight All
                        </button>
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-toggle-case" type="button" aria-pressed="false">
                            Match Case
                        </button>
                        <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-toggle-whole" type="button" aria-pressed="false">
                            Whole Words
                        </button>
                    </div>
                    <button class="c-btn c-btn--ghost c-pdf-btn js-pdf-search-close" type="button" aria-label="Close search">
                        ✕
                    </button>
                </div>
            </div>
            <div class="c-pdf-viewer__scroll js-pdf-scroll" aria-label="{{ item.title }}"></div>
        </div>
        <p class="c-resource-download">
            <a href="{% url 'student_file_download' item.id %}" class="c-btn c-btn--secondary" download>
                Download PDF
            </a>
            <a href="{% url 'student_file_view' item.id %}" class="c-btn c-btn--secondary" target="_blank" rel="noopener">
                Open PDF in new tab
            </a>
        </p>
    {% else %}
        <p class="c-resource-download">
            <a href="{% url 'student_file_download' item.id %}" class="c-btn c-btn--secondary" download>
                Download file
            </a>
        </p>
    {% endif %}
{% endwith %}
