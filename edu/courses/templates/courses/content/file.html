{% with ext=item.file.name|lower|slice:"-4:" %}
    {% if ext == ".pdf" %}
        <div
            class="c-pdf-viewer js-pdf-viewer"
            data-pdf-url="{% url 'student_file_view' item.id %}"
            {% if content %}
            data-content-id="{{ content.id }}"
            data-progress-url="{% url 'track_content_progress' content.id %}"
            {% endif %}
        >
            <div class="c-pdf-toolbar">
                <span class="c-card__meta">
                    Page <strong class="js-pdf-current">1</strong> / <strong class="js-pdf-total">--</strong>
                </span>
            </div>
            <div class="c-pdf-viewer__scroll js-pdf-scroll" aria-label="{{ item.title }}"></div>
        </div>
        <p class="c-resource-download">
            <a href="{% url 'student_file_download' item.id %}" class="c-btn c-btn--secondary" download>
                Download PDF
            </a>
            <a href="{% url 'student_file_view' item.id %}" class="c-btn c-btn--secondary" target="_blank" rel="noopener">
                Open PDF in new tab
            </a>
        </p>
    {% else %}
        <p class="c-resource-download">
            <a href="{% url 'student_file_download' item.id %}" class="c-btn c-btn--secondary" download>
                Download file
            </a>
        </p>
    {% endif %}
{% endwith %}
